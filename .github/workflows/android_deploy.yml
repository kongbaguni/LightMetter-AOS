name: Android Build & Deploy

on:
  push:
    branches: [ "main" ] # 메인 브랜치에 푸시될 때 실행
    tags:
      - 'v*' # v1.0.0 같은 태그가 푸시될 때 실행
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 1. 빌드 테스트 (PR 및 푸시 시 공통)
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # 2. 배포용 AAB 빌드 (태그 푸시 시 실행 추천, 여기서는 메인 브랜치 푸시 시에도 빌드하도록 설정)
      - name: Build Release AAB
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
        run: ./gradlew :app:bundleRelease

      # 3. 서명 (GitHub Secrets 설정 필요)
      # r0adkll/sign-android-release 액션 등을 사용하여 나중에 추가 가능
