name: Android Build & Deploy

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json
          else
            echo "GOOGLE_SERVICES_JSON secret is not set. Building without Google Services."
          fi

      # 1. 빌드 테스트
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # 2. 배포용 AAB 빌드
      - name: Build Release AAB
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
        run: ./gradlew :app:bundleRelease

      # 3. 서명 (GitHub Secrets 설정 필요)
      - name: Sign AAB
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.RELEASE_KEYSTORE }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # 4. Google Play 업로드 (내부 테스트 트랙)
      - name: Upload to Google Play
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
        uses: r0adkll/upload-google-play@v4
        with:
          serviceAccountJsonKeyData: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: net.kongbaguni.lightmetter
          releaseFiles: ${{ steps.sign_app.outputs.signedReleaseFile }}
          track: internal
          status: completed
